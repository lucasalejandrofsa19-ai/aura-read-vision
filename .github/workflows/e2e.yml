name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL alvo do teste E2E"
        required: false
        default: "https://aura-read.lovable.app"

jobs:
  e2e:
    name: Playwright — E2E suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://aura-read.lovable.app' }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
      TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
      TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
      TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: |
          VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Playwright browser (chromium)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Seed story_videos fixture (image_providers badges)
        id: seed-story-video
        if: env.TEST_USER_A_EMAIL != '' && env.TEST_USER_A_PASSWORD != '' && env.VITE_SUPABASE_URL != ''
        run: node scripts/seed-story-video-fixture.mjs >> "$GITHUB_ENV"

      - name: Setup Deno
        if: steps.seed-story-video.outcome == 'success'
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Deno integration test — regenerate-story-video-scene
        if: steps.seed-story-video.outcome == 'success'
        run: |
          deno test supabase/functions/regenerate-story-video-scene/index.test.ts \
            --allow-net --allow-env --allow-read

      - name: Run E2E
        run: npm run test:e2e


      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
