name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL alvo do teste E2E"
        required: false
        default: "https://aura-read.lovable.app"

jobs:
  e2e:
    name: Playwright — E2E suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://aura-read.lovable.app' }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
      TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
      TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
      TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: |
          VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Playwright browser (chromium)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Seed story_videos fixture (image_providers badges)
        id: seed-story-video
        if: env.TEST_USER_A_EMAIL != '' && env.TEST_USER_A_PASSWORD != '' && env.VITE_SUPABASE_URL != ''
        run: node scripts/seed-story-video-fixture.mjs >> "$GITHUB_ENV"

      - name: Verify seed outputs (TEST_BOOK_ID / TEST_STORY_VIDEO_ID)
        id: verify-seed
        if: steps.seed-story-video.outcome == 'success'
        run: |
          UUID_RE='^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
          missing=0
          if [ -z "${TEST_BOOK_ID:-}" ]; then
            echo "::error::TEST_BOOK_ID não foi exportado pelo seed."
            missing=1
          elif ! [[ "$TEST_BOOK_ID" =~ $UUID_RE ]]; then
            echo "::error::TEST_BOOK_ID='$TEST_BOOK_ID' não é um UUID válido."
            missing=1
          fi
          if [ -z "${TEST_STORY_VIDEO_ID:-}" ]; then
            echo "::error::TEST_STORY_VIDEO_ID não foi exportado pelo seed."
            missing=1
          elif ! [[ "$TEST_STORY_VIDEO_ID" =~ $UUID_RE ]]; then
            echo "::error::TEST_STORY_VIDEO_ID='$TEST_STORY_VIDEO_ID' não é um UUID válido."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Seed inválido — abortando antes de Deno/Playwright."
            exit 1
          fi
          echo "✓ Seed OK — TEST_BOOK_ID=$TEST_BOOK_ID TEST_STORY_VIDEO_ID=$TEST_STORY_VIDEO_ID"



      - name: Setup Deno
        if: steps.verify-seed.outcome == 'success'
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Deno integration test — regenerate-story-video-scene
        if: steps.verify-seed.outcome == 'success'
        run: |
          deno test supabase/functions/regenerate-story-video-scene/index.test.ts \
            --allow-net --allow-env --allow-read

      - name: Seed E2E highlight fixture (book + textual highlight for E2E_EMAIL)
        id: seed-e2e-highlight
        if: env.E2E_EMAIL != '' && env.E2E_PASSWORD != '' && env.VITE_SUPABASE_URL != ''
        run: node scripts/seed-e2e-highlight-fixture.mjs >> "$GITHUB_ENV"

      - name: Verify E2E highlight seed (E2E_BOOK_ID / E2E_HIGHLIGHT_ID)
        if: steps.seed-e2e-highlight.outcome == 'success'
        run: |
          UUID_RE='^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
          missing=0
          if [ -z "${E2E_BOOK_ID:-}" ] || ! [[ "$E2E_BOOK_ID" =~ $UUID_RE ]]; then
            echo "::error::E2E_BOOK_ID inválido ou ausente ('${E2E_BOOK_ID:-}')."
            missing=1
          fi
          if [ -z "${E2E_HIGHLIGHT_ID:-}" ] || ! [[ "$E2E_HIGHLIGHT_ID" =~ $UUID_RE ]]; then
            echo "::error::E2E_HIGHLIGHT_ID inválido ou ausente ('${E2E_HIGHLIGHT_ID:-}')."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "✓ E2E highlight seed OK — Book=$E2E_BOOK_ID Highlight=$E2E_HIGHLIGHT_ID"

      - name: Guard — E2E_BOOK_ID and E2E_HIGHLIGHT_ID must be set before running Playwright
        run: |
          UUID_RE='^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
          missing=0
          if [ -z "${E2E_BOOK_ID:-}" ]; then
            echo "::error::E2E_BOOK_ID não está definido. O seed (scripts/seed-e2e-highlight-fixture.mjs) provavelmente falhou ou foi pulado. Verifique se E2E_EMAIL, E2E_PASSWORD e VITE_SUPABASE_URL estão configurados nos secrets."
            missing=1
          elif ! [[ "$E2E_BOOK_ID" =~ $UUID_RE ]]; then
            echo "::error::E2E_BOOK_ID='$E2E_BOOK_ID' não é um UUID válido."
            missing=1
          fi
          if [ -z "${E2E_HIGHLIGHT_ID:-}" ]; then
            echo "::error::E2E_HIGHLIGHT_ID não está definido. O seed (scripts/seed-e2e-highlight-fixture.mjs) provavelmente falhou ou foi pulado. Verifique se E2E_EMAIL, E2E_PASSWORD e VITE_SUPABASE_URL estão configurados nos secrets."
            missing=1
          elif ! [[ "$E2E_HIGHLIGHT_ID" =~ $UUID_RE ]]; then
            echo "::error::E2E_HIGHLIGHT_ID='$E2E_HIGHLIGHT_ID' não é um UUID válido."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "✓ E2E_BOOK_ID e E2E_HIGHLIGHT_ID presentes e válidos: Book=$E2E_BOOK_ID Highlight=$E2E_HIGHLIGHT_ID"

      - name: Run E2E
        run: npm run test:e2e


      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
