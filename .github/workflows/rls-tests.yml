name: RLS Tests (highlights)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rls:
    name: Vitest — highlights RLS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
      TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
      TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
      TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets & env vars
        run: |
          missing=()
          for v in VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY \
                   TEST_USER_A_EMAIL TEST_USER_A_PASSWORD \
                   TEST_USER_B_EMAIL TEST_USER_B_PASSWORD; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Configure them in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "✓ All required secrets present."

      - name: Provision test users + seed book
        run: node scripts/seed-rls-test-data.mjs >> "$GITHUB_ENV"

      - name: Run RLS tests
        run: npx vitest run src/lib/highlightsRls.test.ts
